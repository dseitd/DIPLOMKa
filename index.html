<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Демонстратор</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Custom Navigation Controls (Header) -->
  <div class="custom-nav">
    <div class="nav-title">CREWRAY</div>
    
    <div class="mobile-controls">
      <button class="nav-btn nav-close" id="btn-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
        <span>Закрыть</span>
      </button>
      
      <button class="nav-btn nav-menu" id="btn-menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </div>
    
    <!-- Desktop Navigation (Menu items moved here for desktop) -->
    <div class="desktop-nav-items">
        <a href="#" class="nav-link active">ГЛАВНАЯ</a>
        <a href="#" class="nav-link">WORKSPACE</a>
        <a href="#" class="nav-link">ПРОФИЛЬ</a>
    </div>

    <!-- Desktop specific control (hidden on mobile) -->
    <div class="desktop-controls" id="desktop-controls">
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="12" cy="5" r="1"></circle>
                <circle cx="12" cy="19" r="1"></circle>
            </svg>
        </button>
        <button class="icon-btn" id="btn-close-desktop">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"></path>
            </svg>
        </button>
    </div>
  </div>

  <section class="catalog-page">
    <div class="catalog-layout">
      <aside class="catalog-sidebar">
        <div class="filter-header">
          <div class="filter-header-title">Фильтры</div>
          <button class="filter-close" type="button">Закрыть</button>
        </div>
        <div class="filter-section">
          <div class="filter-title">CATEGORY</div>
          <ul class="filter-list">
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Hoodies">
                <span>HOODIES</span>
                <span class="filter-count">(15)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Shirts">
                <span>SHIRTS</span>
                <span class="filter-count">(10)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Pants">
                <span>PANTS</span>
                <span class="filter-count">(12)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Suits">
                <span>SUITS</span>
                <span class="filter-count">(6)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="T-Shirts">
                <span>T-SHIRTS</span>
                <span class="filter-count">(24)</span>
              </label>
            </li>
          </ul>
        </div>
        <div class="filter-section">
          <div class="filter-title">SIZE</div>
          <ul class="filter-list">
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="XS">
                <span>XS</span>
                <span class="filter-count">(6)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="S">
                <span>S</span>
                <span class="filter-count">(14)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="M">
                <span>M</span>
                <span class="filter-count">(18)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="L">
                <span>L</span>
                <span class="filter-count">(20)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="XL">
                <span>XL</span>
                <span class="filter-count">(11)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="XXL">
                <span>XXL</span>
                <span class="filter-count">(5)</span>
              </label>
            </li>
          </ul>
        </div>
        <div class="filter-section">
          <div class="filter-title">COLOR</div>
          <ul class="color-list">
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Black">
                <span class="color-swatch color-black"></span>
                <span>BLACK</span>
                <span class="filter-count">(55)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Blue">
                <span class="color-swatch color-blue"></span>
                <span>BLUE</span>
                <span class="filter-count">(18)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Gray">
                <span class="color-swatch color-gray"></span>
                <span>GRAY</span>
                <span class="filter-count">(30)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Orange">
                <span class="color-swatch color-orange"></span>
                <span>ORANGE</span>
                <span class="filter-count">(9)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="White">
                <span class="color-swatch color-white"></span>
                <span>WHITE</span>
                <span class="filter-count">(14)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Dark Green">
                <span class="color-swatch color-green"></span>
                <span>DARK GREEN</span>
                <span class="filter-count">(8)</span>
              </label>
            </li>
          </ul>
        </div>
        <div class="filter-footer">
          <button class="filter-reset" type="button">Сбросить</button>
          <button class="filter-apply" type="button">Применить</button>
        </div>
      </aside>
      <main class="catalog-main">
        <div class="catalog-header">
          <div class="catalog-count">0 Products</div>
          <button class="catalog-filters" type="button">Фильтры</button>
        </div>
        <div class="catalog-grid" id="catalog-grid"></div>
        <div class="catalog-footer">
          <button class="catalog-more">Load more products</button>
        </div>
      </main>
      <div class="catalog-backdrop"></div>
    </div>
  </section>

  <!-- Bottom Tab Bar (Mobile Only) -->
  <div class="bottom-tab-bar">
    <div class="bottom-tab-bar__inner">
        <span class="tab-item__icon tab-item__icon--workspace"></span>
        <span class="tab-item__label">Workspace</span>
      </a>
      <a href="#" class="tab-item active">
        <span class="tab-item__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L12 5L20 11.5V20H14V15H10V20H4V11.5Z" fill="#A4A4A4"/>
          </svg>
        </span>
        <span class="tab-item__label">Главная</span>
      </a>
      <a href="profile.html" class="tab-item">
        <span class="tab-item__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M20.792 12C20.792 7.14292 16.8518 3.20455 11.9898 3.20455V1.25C17.9323 1.25 22.748 6.06364 22.748 12C22.748 17.9364 17.9323 22.75 11.9898 22.75V20.7955C16.8518 20.7955 20.792 16.8571 20.792 12ZM9.37098 3.641C8.30783 4.00281 7.31247 4.53454 6.44967 5.20245L5.25172 3.65734C6.29078 2.85298 7.479 2.22008 8.74036 1.79082L9.37098 3.641ZM4.30792 7.57183C3.74708 8.47304 3.35897 9.45814 3.17092 10.4652L1.24805 10.1067C1.48263 8.85047 1.96325 7.63814 2.64684 6.5397L4.30792 7.57183ZM2.64684 17.4603C1.96325 16.3619 1.48263 15.1495 1.24805 13.8933L3.17092 13.5348C3.35897 14.5419 3.74708 15.527 4.30792 16.4282L2.64684 17.4603ZM6.45521 18.8019C7.31102 19.4743 8.30285 19.9955 9.37098 20.359L8.74036 22.2092C7.48398 21.7816 6.29223 21.1602 5.24618 20.3383L6.45521 18.8019Z" fill="#A4A4A4"/>
            <path d="M9.0061 9C9.0061 7.35094 10.3344 6 11.9904 6C13.6463 6 14.9746 7.35094 14.9746 9C14.9746 10.6491 13.6463 12 11.9904 12C10.3344 12 9.0061 10.6491 9.0061 9Z" fill="#A4A4A4"/>
            <path d="M7.45513 15.2182C9.81487 12.7436 14.1389 12.6085 16.55 15.2275C16.6863 15.3756 16.7573 15.572 16.7471 15.7726C16.7369 15.9733 16.6463 16.1615 16.4957 16.2951C15.3004 17.3552 13.7238 18 11.9979 18C10.2722 18 8.69573 17.3553 7.50039 16.2954C7.34806 16.1603 7.25724 15.9694 7.24871 15.7663C7.24018 15.5633 7.31467 15.3654 7.45513 15.2182Z" fill="#A4A4A4"/>
          </svg>
        </span>
        <span class="tab-item__label">Профиль</span>
      </a>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
