      <aside class="catalog-sidebar">
        <div class="filter-header">
          <div class="filter-header-title">Фильтры</div>
          <button class="filter-close" type="button">Закрыть</button>
        </div>
        <div class="filter-section">
          <div class="filter-title">CATEGORY</div>
          <ul class="filter-list">
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Hoodies">
                <span>HOODIES</span>
                <span class="filter-count">(15)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Shirts">

                <span class="filter-count">(10)</span>

            </li>
            <li>
              <label class="filter-option">

                <span class="filter-count">(12)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="category" value="Suits">

                <span class="filter-count">(6)</span>

            <li>

        </div>
        <div class="filter-section">

              <label class="filter-option">

                <span>XS</span>
                <span class="filter-count">(6)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="S">
                <span>S</span>
                <span class="filter-count">(14)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="M">
                <span>M</span>
                <span class="filter-count">(18)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="L">
                <span>L</span>
                <span class="filter-count">(20)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="XL">
                <span>XL</span>
                <span class="filter-count">(11)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="size" value="XXL">
                <span>XXL</span>
                <span class="filter-count">(5)</span>
              </label>
            </li>
          </ul>
        </div>
        <div class="filter-section">
          <div class="filter-title">COLOR</div>
          <ul class="color-list">
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Black">
                <span class="color-swatch color-black"></span>
                <span>BLACK</span>
                <span class="filter-count">(55)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Blue">
                <span class="color-swatch color-blue"></span>
                <span>BLUE</span>
                <span class="filter-count">(18)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Gray">
                <span class="color-swatch color-gray"></span>
                <span>GRAY</span>
                <span class="filter-count">(30)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Orange">
                <span class="color-swatch color-orange"></span>
                <span>ORANGE</span>
                <span class="filter-count">(9)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="White">
                <span class="color-swatch color-white"></span>
                <span>WHITE</span>
                <span class="filter-count">(14)</span>
              </label>
            </li>
            <li>
              <label class="filter-option">
                <input type="checkbox" data-filter="color" value="Dark Green">
                <span class="color-swatch color-green"></span>
                <span>DARK GREEN</span>
                <span class="filter-count">(8)</span>
              </label>
            </li>
          </ul>
        </div>
        <div class="filter-footer">
          <button class="filter-reset" type="button">Сбросить</button>
          <button class="filter-apply" type="button">Применить</button>
        </div>
      </aside>
      <main class="catalog-main">
        <div class="catalog-header">
          <div class="catalog-count">0 Products</div>
          <button class="catalog-filters" type="button">Фильтры</button>
        </div>
        <div class="catalog-grid" id="catalog-grid"></div>
        <div class="catalog-footer">
          <button class="catalog-more">Load more products</button>
        </div>
      </main>
      <div class="catalog-backdrop"></div>
    </div>
